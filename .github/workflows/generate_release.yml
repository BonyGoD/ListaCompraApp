name: Release on version bump

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current versionName from androidApp/build.gradle.kts
        id: gradle_version
        run: |
          VERSION=$(grep 'versionName[[:space:]]*=' androidApp/build.gradle.kts | head -1 | sed 's/.*versionName[[:space:]]*=[[:space:]]*//;s/\"//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📱 Current version: $VERSION"

      - name: Get previous versionName from parent commit
        id: previous_version
        run: |
          git show HEAD^:androidApp/build.gradle.kts > old_build.gradle.kts || touch old_build.gradle.kts
          PREV_VERSION=$(grep 'versionName[[:space:]]*=' old_build.gradle.kts | head -1 | sed 's/.*versionName[[:space:]]*=[[:space:]]*//;s/\"//g')
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "📱 Previous version: $PREV_VERSION"

      - name: Compare versionNames
        id: version_compare
        run: |
          echo "========================================"
          echo "📱 Current version: ${{ steps.gradle_version.outputs.version }}"
          echo "📱 Previous version: ${{ steps.previous_version.outputs.prev_version }}"
          echo "========================================"
          
          if [ -z "${{ steps.gradle_version.outputs.version }}" ]; then
            echo "❌ ERROR: No se pudo leer la versión actual"
            exit 1
          fi
          
          if [ "${{ steps.gradle_version.outputs.version }}" = "${{ steps.previous_version.outputs.prev_version }}" ]; then
            echo "ℹ️  No version bump detected - skipping release"
            echo "💡 Para crear un release, incrementa versionName en androidApp/build.gradle.kts"
            echo "bump=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Version bump detected!"
            echo "   ${{ steps.previous_version.outputs.prev_version }} → ${{ steps.gradle_version.outputs.version }}"
            echo "🚀 Creating release..."
            echo "bump=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog from merged PRs in develop
        if: steps.version_compare.outputs.bump == 'true'
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Generando changelog desde PRs mergeadas en develop ==="

          # Obtener la fecha de publicación del último release
          LAST_RELEASE_DATE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            jq -r '.published_at // "1970-01-01T00:00:00Z"')

          echo "📅 Último release publicado: $LAST_RELEASE_DATE"

          # Obtener PRs mergeadas en develop después del último release
          # Paginamos hasta 100 por seguridad
          PRS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=closed&base=develop&sort=updated&direction=desc&per_page=100" | \
            jq -r --arg since "$LAST_RELEASE_DATE" \
            '[.[] | select(.merged_at != null and .merged_at > $since)] | .[] | "- \(.title) (#\(.number))"')

          echo "=== PRs encontradas ==="
          echo "$PRS"
          echo "======================"

          CHANGELOG="## What's Changed"

          if [ -n "$PRS" ]; then
            CHANGELOG="${CHANGELOG}"$'\n'"${PRS}"
          else
            echo "⚠️ No se encontraron PRs, usando mensaje por defecto"
            CHANGELOG="${CHANGELOG}"$'\n'"- Release version v${{ steps.gradle_version.outputs.version }}"
          fi

          echo "$CHANGELOG" > changelog.txt

          echo ""
          echo "=== CHANGELOG FINAL ==="
          cat changelog.txt
          echo "=== FIN CHANGELOG ==="

      - name: Create Release
        if: steps.version_compare.outputs.bump == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.gradle_version.outputs.version }}"
          name: "v${{ steps.gradle_version.outputs.version }}"
          body_path: changelog.txt
          draft: false
          prerelease: false
